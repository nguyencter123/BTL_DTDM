version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: proshop-mongo-db
    restart: always
    # XÓA PORTS ĐỂ BẢO MẬT ZERO-TRUST. KHÔNG AI BÊN NGOÀI VÀO ĐƯỢC DB!
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proshop-backend
    restart: always
    # Xóa ports, ẩn Backend khỏi Internet, chỉ giao tiếp nội bộ
    env_file: 
      - .env
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: proshop-frontend
    restart: always
    # Xóa ports, Nginx bên trong frontend giờ chỉ phục vụ nội bộ ở cổng 80

  nginx:
    image: nginx:alpine
    container_name: proshop-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - frontend
      - backend

  certbot:
    image: certbot/certbot
    container_name: proshop-certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # ----------------------------------------------------
  # GIAI ĐOẠN 3: PLAG STACK (GIÁM SÁT & CẢNH BÁO)
  # ----------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: proshop-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    depends_on:
      - node-exporter

  node-exporter:
    image: prom/node-exporter:latest
    container_name: proshop-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      
  grafana:
    image: grafana/grafana:latest
    container_name: proshop-grafana
    restart: unless-stopped
    ports:
      - "3000:3000" # Mở cổng 3000 ra ngoài để truy cập giao diện giám sát
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  mongo_data:
  grafana_data:
