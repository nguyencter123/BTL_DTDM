version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: proshop-mongo-db
    restart: always
    # XÓA PORTS ĐỂ BẢO MẬT ZERO-TRUST. KHÔNG AI BÊN NGOÀI VÀO ĐƯỢC DB!
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proshop-backend
    restart: always
    # Xóa ports, ẩn Backend khỏi Internet, chỉ giao tiếp nội bộ
    env_file: 
      - .env
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: proshop-frontend
    restart: always
    # Xóa ports, Nginx bên trong frontend giờ chỉ phục vụ nội bộ ở cổng 80

  nginx:
    image: nginx:alpine
    container_name: proshop-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - frontend
      - backend

  certbot:
    image: certbot/certbot
    container_name: proshop-certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  mongo_data:
