global:
  scrape_interval: 15s # Mặc định 15 giây lấy dữ liệu 1 lần

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    # Lấy dữ liệu phần cứng máy chủ AWS (CPU, RAM, Disk)
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    # Lấy dữ liệu của từng Docker Container (Frontend, Backend, MongoDB...)
    static_configs:
      - targets: ['cadvisor:8080']
